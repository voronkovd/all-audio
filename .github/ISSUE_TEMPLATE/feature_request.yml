name: Feature Request
description: Suggest an idea for All Audio
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe the problem and proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: I'm always frustrated when ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you considered

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - UI / UX
        - Conversion / FFmpeg
        - CUE splitting
        - Localization
        - Packaging / releases
        - Other
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this request
          required: true
        - label: This feature fits the project's scope (desktop audio conversion)
          required: true
